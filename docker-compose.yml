services:
  salesrx:
    build: .
    image: salesrx:latest
    container_name: salesrx
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # v2.0 team mode — comment out to run single-user file mode instead
      DATABASE_URL: postgres://salesrx:salesrx@postgres:5432/salesrx
    volumes:
      - salesrx-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: salesrx-db
    environment:
      POSTGRES_USER: salesrx
      POSTGRES_PASSWORD: salesrx
      POSTGRES_DB: salesrx
    volumes:
      - salesrx-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salesrx"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Nightly watchlist refresh (03:00 UTC) — signal alerts without any external cron
  watchlist-cron:
    image: alpine:3.20
    container_name: salesrx-cron
    depends_on:
      - salesrx
    command: >
      sh -c "apk add --no-cache curl >/dev/null &&
             printf '0 3 * * * curl -s -X POST http://salesrx:3000/api/watchlist/refresh\n0 5 * * * curl -s -X POST http://salesrx:3000/api/calendar/autoprep\n' | crontab - &&
             crond -f -l 8"
    restart: unless-stopped

volumes:
  salesrx-data:
  salesrx-pgdata:
